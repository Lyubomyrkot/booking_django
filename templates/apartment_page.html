{% extends 'base.html' %}

{% block content %}
    <h1>Appartment</h1>
    <img src="{{ apartment.image.url }}" alt="Apartment Image" class="img-fluid">
    <p>{{ apartment.name }}</p>
    <p>{{ apartment.description }}</p>
    <p>{{ apartment.price }}</p>
    <a href="{% url 'booking_page' apartment_id=apartment.id %}" class="btn btn-primary mb-5">Book Now</a>
{% endblock %}
